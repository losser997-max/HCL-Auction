<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCL - 2026 Auction Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="header">
        <h1>HCL - 2026</h1>
        <div class="controls-top">
            <input type="file" id="fileInput" accept=".xlsx, .xls">
            <button onclick="loadExcel()">1. Load & Randomize Players</button>
            <button onclick="downloadResults()" class="btn-success">Download Results</button>
            <button onclick="resetAuction()" class="btn-danger">Reset Board</button>
        </div>
    </div>

    <div class="dashboard-layout">
        
        <!-- MAIN CONTENT (Left Side) -->
        <div class="main-area">
            
            <!-- PROMINENT ACTIVE PLAYER AREA -->
            <div class="active-auction-board" id="auctionBoard" style="display: none;">
                <div class="player-showcase">
                    <h2 id="dispName">Player Name</h2>
                    <h3 id="dispRole">Role</h3>
                    <p class="remaining-text">Players Remaining in Pool: <span id="dispRemaining">0</span></p>
                </div>

                <div class="bidding-controls">
                    <div class="control-group">
                        <label>Bid Amount</label>
                        <input type="number" id="bidAmount" value="2" step="1" min="2">
                    </div>
                    <div class="control-group">
                        <label>Select Team</label>
                        <!-- Options are now injected by app.js so they update when you change team names -->
                        <select id="teamSelect"></select>
                    </div>
                    <div class="control-buttons">
                        <button class="sell-btn" onclick="sellPlayer()">SOLD!</button>
                        <button class="btn-secondary" onclick="passPlayer()">PASS</button>
                    </div>
                </div>
            </div>

            <!-- TEAMS GRID (6 Columns) -->
            <div class="teams-columns" id="teamsGrid"></div>
        </div>

        <!-- RIGHT SIDEBAR (Auctioned Players History) -->
        <div class="history-sidebar">
            <h2>Auctioned Players</h2>
            <ul id="historyList" class="history-list"></ul>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
